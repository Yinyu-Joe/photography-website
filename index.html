  </head>
  <body class="home-page">
    <header class="site-header home-header">
      <a class="brand-lockup" href="index.html" aria-label="Yinyu Zhu Photography home">

        <span class="brand-role" data-i18n="profile.role">摄影师</span>

      <nav class="main-nav compact-nav" aria-label="Main navigation">
        <div class="nav-item has-submenu">
          <a class="nav-link" href="work.html" data-i18n="nav.work">作品</a>
          <div class="nav-submenu" aria-label="Work collections">

            <a href="work.html#gallery-landscape" data-i18n="nav.landscape">风景</a>

            <a href="work.html#gallery-abstract" data-i18n="nav.abstract">抽象</a>

        <a class="social-button" href="#" aria-label="TikTok">
          <img src="assets/icons/tiktok.svg" alt="">
        </a>
        <a class="social-button" href="#" aria-label="Instagram">
          <img src="assets/icons/instagram.svg" alt="">
        </a>
        <a class="social-button" href="#" aria-label="X">

        <button class="language-switch" type="button" data-language-switch aria-label="Switch to English">EN</button>
